<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${job.title} + ' | NaukriHub'">Job Detail</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f7fb;
    margin: 0;
}

/* CONTAINER */
.container {
    width: 85%;
    margin: auto;
    margin-top: 30px;
}

/* CARD */
.job-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* HEADER */
.job-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.job-title {
    font-size: 26px;
    font-weight: 700;
}

.company {
    color: #555;
    margin-top: 5px;
}

.location {
    color: #777;
}

/* APPLY BUTTON */
.apply-btn {
    background: linear-gradient(45deg,#4facfe,#00f2fe);
    border: none;
    padding: 12px 22px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-weight: 600;
}

/* BADGE */
.badge {
    background: #e6f9ec;
    color: green;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

/* SECTION */
.section {
    margin-top: 25px;
}

.section h3 {
    margin-bottom: 10px;
}

/* APPLY BOX */
.apply-box {
    margin-top: 20px;
}

textarea {
    width: 100%;
    height: 100px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
.submit-btn {
    margin-top: 10px;
    background: #4facfe;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="job-card">

    <!-- HEADER -->
    <div class="job-header">
        <div>
            <div class="job-title" th:text="${job.title}">Title</div>
            <div class="company" th:text="${job.company}">Company</div>
            <div class="location" th:text="${job.location}">Location</div>
            <p><b>Applicants:</b> <span th:text="${job.applicationCount}">0</span></p>
        </div>

        <!-- APPLY BUTTON -->
        <div th:if="${hasApplied == null or !hasApplied}">
            <button onclick="showApplyBox()" class="apply-btn">Apply Now</button>
        </div>
    </div>

    <!-- SUCCESS -->
    <div th:if="${applySuccess != null and applySuccess}" class="badge">
        🎉 Application submitted successfully!
    </div>

    <!-- ALREADY APPLIED -->
    <div th:if="${hasApplied != null and hasApplied}" class="badge">
        ✔ You already applied for this job
    </div>

    <!-- APPLY FORM (HIDDEN BOX LIKE NAUKRI) -->
    <div id="applyBox" class="apply-box"
         th:if="${hasApplied == null or !hasApplied}"
         style="display:none;">

        <form th:action="@{/jobs/{id}/apply(id=${job.id})}" method="post">
            <textarea name="coverLetter" placeholder="Write your cover letter..."></textarea>
            <br>
            <button type="submit" class="submit-btn">Submit Application</button>
        </form>

    </div>

    <!-- DESCRIPTION -->
    <div class="section" th:if="${job.description}">
        <h3>Description</h3>
        <p th:text="${job.description}"></p>
    </div>

    <!-- REQUIREMENTS -->
    <div class="section" th:if="${job.requirements}">
        <h3>Requirements</h3>
        <p th:text="${job.requirements}"></p>
    </div>

    <!-- SKILLS -->
    <div class="section" th:if="${job.skills}">
        <h3>Skills</h3>
        <p th:text="${job.skills}"></p>
    </div>

</div>

</div>

<!-- JS -->
<script>
function showApplyBox() {
    document.getElementById("applyBox").style.display = "block";
}
</script>

</body>
</html>
