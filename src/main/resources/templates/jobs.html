<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Browse Jobs – NaukriHub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" th:href="@{/css/style.css}">

<style>
.jobs-page-header{background:var(--gradient-dark);padding:2.75rem 0 0;color:white}
.jobs-body{display:grid;grid-template-columns:280px 1fr;gap:1.75rem;padding:2rem 0 3rem;align-items:start}
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.75rem}
.results-count{font-weight:700;color:var(--dark);font-size:1rem}
@media(max-width:900px){.jobs-body{grid-template-columns:1fr}}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a th:href="@{/}" class="nav-brand"><i class="fas fa-briefcase"></i> NaukriHub</a>

  <div class="nav-links">
    <a th:href="@{/jobs}" class="active">Browse Jobs</a>

    <div sec:authorize="isAnonymous()">
      <a th:href="@{/login}">Login</a>
      <a th:href="@{/register}">Register</a>
    </div>

    <div sec:authorize="isAuthenticated()">
      <a th:href="@{/dashboard}">Dashboard</a>
      <a th:href="@{/profile/view}">Profile</a>
      <a th:href="@{/logout}">Logout</a>
    </div>
  </div>
</nav>

<div class="container">

<h2>Available Jobs</h2>

<!-- JOB LIST -->
<div th:if="${not #lists.isEmpty(jobs)}" style="display:flex;flex-direction:column;gap:0.75rem">

  <div th:each="job : ${jobs}" class="job-list-item"
       th:onclick="'window.location=\'/jobs/'+${job.id}+'\''">

    <div class="job-list-body">
      <div class="job-list-title" th:text="${job.title}">Title</div>
      <div class="job-list-company" th:text="${job.company}">Company</div>
      <div th:text="${job.location}">Location</div>
    </div>

    <div class="job-list-side">

      <!-- ✅ FIXED BUTTON (ONLY CHANGE) -->
      <button th:attr="onclick='event.stopPropagation(); openApplyModal(' + ${job.id} + ')'"
              class="btn btn-primary btn-sm">
        Apply Now
      </button>

      <span th:text="${job.applicationCount}+' applied'">0 applied</span>

    </div>

  </div>

</div>

</div>

<!-- ✅ ADDED MODAL -->
<div id="applyModal"
     style="display:none; position:fixed; top:0; left:0;
            width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">

  <div style="background:white; padding:20px; width:400px;
              margin:120px auto; border-radius:10px;">

    <h3>Apply Job</h3>

    <form id="applyForm" method="post">
      <textarea name="coverLetter"
                placeholder="Cover Letter"
                style="width:100%; height:100px;"></textarea>

      <br><br>

      <button type="submit">Submit</button>
      <button type="button" onclick="closeModal()">Cancel</button>
    </form>

  </div>
</div>

<!-- ✅ JS (ONLY ADD) -->
<script>
function openApplyModal(jobId) {
    document.getElementById("applyModal").style.display = "block";
    document.getElementById("applyForm").action = "/jobs/" + jobId + "/apply";
}

function closeModal() {
    document.getElementById("applyModal").style.display = "none";
}
</script>

</body>
</html>
